services:
  oversight-db:
    image: pgvector/pgvector:pg17
    container_name: oversight-db
    restart: unless-stopped
    shm_size: 16gb
    ports:
      - "127.0.0.1:5432:5432"   # localhost-only (was world-open; Docker bypasses the host firewall)
    environment:
      POSTGRES_USER: oversight
      POSTGRES_PASSWORD: ${OVERSIGHT_DB_PASSWORD:?OVERSIGHT_DB_PASSWORD must be set}
      POSTGRES_DB: oversight
    volumes:
      - /var/lib/oversight/postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oversight -d oversight"]
      interval: 10s
      timeout: 5s
      retries: 5

  oversight-backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    # Tag defaults to :dev so local builds never clobber prod's images on the
    # shared docker daemon. Prod sets OVERSIGHT_TAG (see configuration.nix).
    image: oversight-backend:${OVERSIGHT_TAG:-dev}
    restart: unless-stopped
    ports:
      - "127.0.0.1:50:50"   # localhost-only (frontend reaches it over the docker network anyway)
    environment:
      - FLASK_PORT=50
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://oversight:${OVERSIGHT_DB_PASSWORD_URL_ENCODED:?OVERSIGHT_DB_PASSWORD_URL_ENCODED must be set}@oversight-db:5432/oversight
      - CORS_ORIGINS=http://localhost,http://oversight-frontend:3000
    depends_on:
      oversight-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  oversight-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://oversight-backend:50
    image: oversight-frontend:${OVERSIGHT_TAG:-dev}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # published to localhost so the host's native Caddy can reverse-proxy it
                                 # (was `expose`, i.e. docker-network-only, reachable only by the old caddy container)
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://oversight-backend:50
    depends_on:
      oversight-backend:
        condition: service_healthy

  # The caddy reverse-proxy container has been removed: on the NixOS host the
  # reverse proxy is provided natively by `services.caddy`, which terminates TLS
  # and proxies to the frontend at 127.0.0.1:3000 (published above). Running a
  # caddy container here too would fight the host Caddy for ports 80/443.
  # NOTE: this assumes a host-level reverse proxy — see PR description.

networks:
  default:
    name: oversight-network
